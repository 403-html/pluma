# docker-compose.yml — monorepo root
#
# Runs the full Pluma stack: PostgreSQL, Redis, Postfix relay, API, and Next.js frontend.
# Build context is the monorepo root so that workspace packages
# (@pluma-flags/types) are reachable during the build.
#
# Usage:
#   docker compose up --build          # first run (builds images)
#   docker compose up                  # subsequent runs
#   docker compose up api              # API + its dependencies only
#
# Override defaults with env vars:
#   DB_PASSWORD=secret docker compose up
#   API_URL=https://api.example.com docker compose up
#
# Outbound mail:
#   Postfix relay sends to real recipients. For direct delivery no extra config
#   is needed. To route through a smarthost (Gmail, SendGrid, etc.) set:
#     RELAYHOST=[smtp.gmail.com]:587
#     RELAYHOST_USERNAME=you@gmail.com
#     RELAYHOST_PASSWORD=your-app-password

services:

  # postgres — shared PostgreSQL 16 database
  postgres:
    image: postgres:16-alpine
    container_name: pluma-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-pluma}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pluma}
      POSTGRES_DB: ${DB_NAME:-pluma}
    volumes:
      - pluma_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 10s
      timeout: 5s
      retries: 5

  # redis — lightweight in-memory store used for the BullMQ email job queue
  redis:
    image: redis:7-alpine
    container_name: pluma-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # postfix — outbound SMTP relay; delivers mail to real recipients.
  # Override RELAYHOST* env vars to route through an external smarthost.
  # See: https://github.com/boky/docker-postfix
  postfix:
    image: boky/postfix:latest
    container_name: pluma-postfix
    restart: unless-stopped
    ports:
      - '1587:587'
    environment:
      HOSTNAME: ${SMTP_HOSTNAME:-pluma.local}
      ALLOWED_SENDER_DOMAINS: ${SMTP_ALLOWED_DOMAINS:-pluma.local}
      RELAYHOST: ${RELAYHOST:-}
      RELAYHOST_USERNAME: ${RELAYHOST_USERNAME:-}
      RELAYHOST_PASSWORD: ${RELAYHOST_PASSWORD:-}

  # api — Pluma Fastify API server
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: pluma-api:local
    container_name: pluma-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      postfix:
        condition: service_started
    ports:
      - '2137:2137'
    environment:
      # "postgres" / "redis" / "postfix" resolve via the shared compose network.
      DATABASE_URL: postgresql://${DB_USER:-pluma}:${DB_PASSWORD:-pluma}@postgres:5432/${DB_NAME:-pluma}?schema=public
      PORT: 2137
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      SMTP_HOST: postfix
      SMTP_PORT: 587
      SMTP_SECURE: 'false'
      SMTP_FROM: ${SMTP_FROM:-noreply@pluma.local}

  # app — Pluma Next.js frontend
  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
    image: pluma-app:local
    container_name: pluma-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # "api" resolves to the api service on the shared compose network.
      # Override with API_URL for external access (e.g. https://api.example.com).
      API_URL: ${API_URL:-http://api:2137}
      PORT: 3000
      NODE_ENV: production

volumes:
  pluma_postgres_data:
    name: pluma_postgres_data
