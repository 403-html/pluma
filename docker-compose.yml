# docker-compose.yml — monorepo root (local development + testing)
#
# Runs the full Pluma stack locally: PostgreSQL, API (scalable), nginx, and
# Next.js frontend.  Images are built from the local source tree so that code
# changes are reflected immediately on the next `--build`.
#
# For production / no-build deployments see README.md (GHCR images).
#
# Usage:
#   docker compose build                        # build images once from source
#   docker compose up                           # start the stack (single API instance)
#   docker compose up --scale api=3             # scale to 3 replicas (no rebuild needed)
#   docker compose up --build --scale api=3     # rebuild + start with 3 replicas
#   docker compose up api                       # API + its postgres dependency only
#
# Override defaults with env vars:
#   DB_PASSWORD=secret docker compose up
#   API_PORT=8080 docker compose up             # expose nginx on a different host port
#
# Horizontal scaling notes:
#   - "container_name" is intentionally absent from the api service so that Docker
#     can create multiple named replicas (pluma-api-1, pluma-api-2, …).
#   - The api service uses "expose" (internal only) instead of "ports" so that
#     multiple replicas can coexist without host-port conflicts.
#   - nginx resolves the upstream name "api" via Docker Compose DNS, which
#     automatically round-robins across all healthy api replicas.
#   - The single host-facing port (${API_PORT:-2137}) is owned by nginx only.

name: pluma

services:

  # postgres — shared PostgreSQL 16 database
  postgres:
    image: postgres:16-alpine
    container_name: pluma-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-pluma}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pluma}
      POSTGRES_DB: ${DB_NAME:-pluma}
    volumes:
      - pluma_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 10s
      timeout: 5s
      retries: 5

  # api — Pluma Fastify API server; waits for postgres to be healthy.
  # No container_name — allows multiple replicas via --scale api=N.
  # No host-port binding — nginx is the sole ingress point.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: pluma-api:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '2137'
    environment:
      # "postgres" resolves to the postgres service on the shared compose network.
      DATABASE_URL: postgresql://${DB_USER:-pluma}:${DB_PASSWORD:-pluma}@postgres:5432/${DB_NAME:-pluma}?schema=public
      PORT: 2137
      NODE_ENV: production

  # nginx — reverse proxy and round-robin load balancer in front of api replicas.
  # Exposes ${API_PORT:-2137} on the host and forwards to all api containers.
  nginx:
    image: nginx:1.27-alpine
    container_name: pluma-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${API_PORT:-2137}:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # app — Pluma Next.js frontend
  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
    image: pluma-app:local
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Traffic goes through nginx so that the frontend always reaches a healthy
      # API replica regardless of how many are running.
      # Override with API_URL for external access (e.g. https://api.example.com).
      API_URL: ${API_URL:-http://nginx:80}
      PORT: 3000
      NODE_ENV: production

volumes:
  pluma_postgres_data:
    name: pluma_postgres_data
