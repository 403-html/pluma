# Pluma API — nginx reverse proxy / load balancer
#
# Used by docker-compose.yml when running multiple API replicas:
#   docker compose up --scale api=3
#
# Docker Compose DNS resolves the upstream name "api" to ALL running
# api container IPs, so nginx round-robins across instances automatically.

upstream pluma_api {
    server api:2137;
}

server {
    listen 80;

    # Forward all traffic to the API upstream.
    location / {
        proxy_pass         http://pluma_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep-alive connections to upstreams.
        proxy_set_header   Connection        "";
    }
}
