# Reusable workflow — build and push one Pluma Docker image to GHCR.
# Parameterised by image name (api|app) and Dockerfile path so both images
# can be built without duplicating the 6-step setup.
# Called by release.yml (manual hotfix) and auto-release.yml (automated).
name: _Build Docker Image

on:
  workflow_call:
    inputs:
      image:
        description: Image name suffix — "api" or "app"
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile (e.g. "apps/api/Dockerfile")
        required: true
        type: string
      version:
        description: Full semver version string (e.g. "1.2.3")
        required: true
        type: string
      major:
        description: Major version component (e.g. "1")
        required: true
        type: string
      minor:
        description: Minor version component (e.g. "2")
        required: true
        type: string
      ref:
        description: >
          Git ref or SHA to checkout. Defaults to the calling workflow's SHA
          when omitted.
        required: false
        type: string
        default: ""

jobs:
  build:
    name: Build and push pluma-${{ inputs.image }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pluma-${{ inputs.image }}
          tags: |
            type=raw,value=v${{ inputs.version }}
            type=raw,value=v${{ inputs.major }}.${{ inputs.minor }}
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
