name: "Release — SDK"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (semver, e.g. 1.0.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

permissions:
  contents: write
  id-token: write

jobs:
  publish-sdk:
    name: Publish SDK to npm
    runs-on: ubuntu-latest

    steps:
      - name: Validate semver
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid semver: '$VERSION'"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag does not exist
        run: |
          if git rev-parse "sdk/v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag sdk/v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: pnpm --filter @pluma-flags/sdk pkg set version="${{ inputs.version }}"

      - name: Build SDK
        run: pnpm --filter @pluma-flags/sdk build

      - name: Run SDK tests
        run: pnpm --filter @pluma-flags/sdk test

      - name: Publish to npm
        run: pnpm --filter @pluma-flags/sdk publish --no-git-checks --access public --provenance --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/sdk/package.json
          git commit -m "chore(release): sdk v${{ inputs.version }}"
          git tag -a "sdk/v${{ inputs.version }}" -m "Release SDK v${{ inputs.version }}"
          git push origin HEAD --follow-tags
