name: "Release — SDK"

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

permissions:
  contents: read
  id-token: write

jobs:
  publish-sdk:
    name: Publish SDK to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'sdk/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#sdk/v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Validate semver
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid semver: '$VERSION'"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: (cd packages/sdk && npm pkg set version="${{ env.RELEASE_VERSION }}")

      - name: Build types
        run: pnpm --filter @pluma-flags/types build

      - name: Build SDK
        run: pnpm --filter @pluma-flags/sdk build

      - name: Run SDK tests
        run: pnpm --filter @pluma-flags/sdk test

      - name: Publish to npm
        run: pnpm --filter @pluma-flags/sdk publish --no-git-checks --access public --provenance --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

