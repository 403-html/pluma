# Automated release workflow for Pluma.
#
# Trigger: fires via workflow_run after the "CI" workflow completes successfully
#          on the main branch. This ensures broken builds are never released.
#
# Release groups:
#   types/v*   → publish @pluma-flags/types to npm
#   sdk/v*     → publish @pluma-flags/sdk to npm (waits for types if also releasing)
#   v*         → build & push Docker images to GHCR (pluma-api + pluma-app)
#
# Skip-release guard: if the HEAD commit subject matches ^chore\(release\):
#   the workflow exits immediately to break the version-bump → CI → release loop.
#
# After a successful publish the update-main job commits version bumps to main
# with "chore(release): bump versions [skip ci]" — the [skip ci] flag is an
# additional safety net, but the ^chore\(release\): prefix is the primary guard.
#
# Required secrets:
#   - NPM_TOKEN: npm publish authentication (types + sdk jobs)
#   - GITHUB_TOKEN: auto-provided — GHCR push + tag push + main update

name: Auto Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: auto-release
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

permissions:
  contents: write      # push tags, push to main, create GitHub Releases
  packages: write      # push Docker images to GHCR
  id-token: write      # npm provenance for SDK publish
  pull-requests: read  # read merged PR labels for bump override

jobs:
  # ------------------------------------------------------------------ detect
  detect:
    name: Detect changes and compute versions
    runs-on: ubuntu-latest
    # Only proceed when the triggering CI run was successful
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      sha:            ${{ steps.info.outputs.sha }}
      release_types:  ${{ steps.detect.outputs.release_types }}
      release_sdk:    ${{ steps.detect.outputs.release_sdk }}
      release_docker: ${{ steps.detect.outputs.release_docker }}
      types_version:  ${{ steps.detect.outputs.types_version }}
      sdk_version:    ${{ steps.detect.outputs.sdk_version }}
      docker_version: ${{ steps.detect.outputs.docker_version }}
      docker_major:   ${{ steps.detect.outputs.docker_major }}
      docker_minor:   ${{ steps.detect.outputs.docker_minor }}
      last_types_tag:  ${{ steps.detect.outputs.last_types_tag }}
      last_sdk_tag:    ${{ steps.detect.outputs.last_sdk_tag }}
      last_docker_tag: ${{ steps.detect.outputs.last_docker_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pin to the exact SHA the CI run validated — avoids race conditions
          # with commits pushed after CI started.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0   # full history + all tags needed for git log / git tag

      - name: Set SHA output
        id: info
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Resolve bump overrides from PR labels
        id: pr_bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          PR_LABELS=$(gh api "repos/${{ github.repository }}/commits/${SHA}/pulls" \
            -H "Accept: application/vnd.github+json" \
            -q '.[0].labels // [] | .[].name' 2>/dev/null || echo "")

          # Returns major > minor > patch from a newline-separated label list.
          highest_bump() {
            local BUMP=""
            while IFS= read -r lbl; do
              case "${lbl}" in
                *:major) echo "major"; return ;;
                *:minor) BUMP="minor" ;;
                *:patch) [[ -z "${BUMP}" ]] && BUMP="patch" ;;
              esac
            done <<< "${1}"
            echo "${BUMP}"
          }

          TYPES_LABELS=$(echo "${PR_LABELS}" | grep '^types:' || true)
          DOCKER_LABELS=$(echo "${PR_LABELS}" | grep -E '^(api|app):' || true)
          SDK_LABELS=$(echo "${PR_LABELS}" | grep '^sdk:' || true)
          TYPES_OVERRIDE=$(highest_bump "${TYPES_LABELS}")
          DOCKER_OVERRIDE=$(highest_bump "${DOCKER_LABELS}")
          SDK_OVERRIDE=$(highest_bump "${SDK_LABELS}")

          {
            echo "types_override=${TYPES_OVERRIDE}"
            echo "docker_override=${DOCKER_OVERRIDE}"
            echo "sdk_override=${SDK_OVERRIDE}"
          } >> "$GITHUB_OUTPUT"
          if [[ -n "${TYPES_OVERRIDE}" ]]; then echo "types bump override from label: ${TYPES_OVERRIDE}"; fi
          if [[ -n "${DOCKER_OVERRIDE}" ]]; then echo "docker bump override from label: ${DOCKER_OVERRIDE}"; fi
          if [[ -n "${SDK_OVERRIDE}" ]]; then echo "sdk bump override from label: ${SDK_OVERRIDE}"; fi

      # ---- Skip-release guard ----------------------------------------
      # If the HEAD commit was itself a version-bump commit we exit early to
      # prevent an infinite loop (bump commit → CI → auto-release → bump …).
      - name: Check skip-release guard
        id: guard
        run: |
          SUBJECT=$(git log -1 --format="%s")
          echo "HEAD commit subject: ${SUBJECT}"
          if [[ "${SUBJECT}" =~ ^chore\(release\): ]]; then
            echo "::notice::Skip-release guard matched — exiting without release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ---- Path-based change detection + conventional-commit bumps ----
      - name: Detect changes and compute versions
        id: detect
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          # --- helpers ---

          # Return the newest tag matching a glob pattern (semver-sorted).
          get_last_tag() {
            git tag -l "$1" --sort=-version:refname | head -1
          }

          # The very first commit reachable from HEAD — used as base when no tag
          # exists yet.  Specifying HEAD ensures the root is on the current
          # branch even in repos with multiple root commits or grafts.
          # head -1 takes only the first result, which is sufficient here.
          INITIAL_COMMIT=$(git rev-list --max-parents=0 HEAD | head -1)

          # Determine bump type from a block of commit message text.
          # Precedence: bang-commits (feat!) → major, feat → minor, else patch.
          # Regex patterns are stored in variables to prevent bash from
          # misinterpreting special characters (e.g. '(' in character classes).
          BANG_RE='^(feat|fix|build|chore|ci|docs|style|refactor|perf|test)!:'
          FEAT_COLON_RE='^feat:'
          FEAT_SCOPE_RE='^feat\('

          get_bump_type() {
            local MESSAGES="${1}"
            local BUMP="patch"
            while IFS= read -r line; do
              if [[ "${line}" =~ $BANG_RE ]]; then
                BUMP="major"; break
              fi
              if { [[ "${line}" =~ $FEAT_COLON_RE ]] || [[ "${line}" =~ $FEAT_SCOPE_RE ]]; } \
                 && [[ "${BUMP}" != "major" ]]; then
                BUMP="minor"
              fi
            done <<< "${MESSAGES}"
            echo "${BUMP}"
          }

          # Apply a semver bump to a version string (must be X.Y.Z).
          bump_version() {
            local V="${1}" BUMP="${2}"
            local MAJOR REST MINOR PATCH
            # Validate inputs
            if [[ ! "${V}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid semver: '${V}'" >&2; return 1
            fi
            if [[ ! "${BUMP}" =~ ^(major|minor|patch)$ ]]; then
              echo "::error::Invalid bump type: '${BUMP}'" >&2; return 1
            fi
            MAJOR="${V%%.*}"
            REST="${V#*.}"
            MINOR="${REST%%.*}"
            PATCH="${REST#*.}"
            case "${BUMP}" in
              major) echo "$((MAJOR+1)).0.0" ;;
              minor) echo "${MAJOR}.$((MINOR+1)).0" ;;
              *)     echo "${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          }

          # --- Types ---

          LAST_TYPES_TAG=$(get_last_tag "types/v*.*.*")
          TYPES_BASE="${LAST_TYPES_TAG:-${INITIAL_COMMIT}}"
          TYPES_COMMITS=$(git log "${TYPES_BASE}..HEAD" --format="%s" -- packages/types/ \
            | grep -vc '^chore(release):' || true)

          if [[ "${TYPES_COMMITS}" -gt 0 ]]; then
            TYPES_MSGS=$(git log "${TYPES_BASE}..HEAD" --format="%s%n%b" -- packages/types/)
            TYPES_BUMP=$(get_bump_type "${TYPES_MSGS}")
            [[ -n "${{ steps.pr_bump.outputs.types_override }}" ]] && TYPES_BUMP="${{ steps.pr_bump.outputs.types_override }}"
            CURRENT=$(jq -r '.version' packages/types/package.json)
            NEW_VER=$(bump_version "${CURRENT}" "${TYPES_BUMP}")
            if git rev-parse --verify "refs/tags/types/v${NEW_VER}" >/dev/null 2>&1; then
              echo "::notice::types/v${NEW_VER} already tagged — skipping"
              echo "release_types=false" >> "$GITHUB_OUTPUT"
            else
              echo "Detected types change: ${CURRENT} → ${NEW_VER} (${TYPES_BUMP})"
              echo "release_types=true"    >> "$GITHUB_OUTPUT"
              echo "types_version=${NEW_VER}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No types changes detected"
            echo "release_types=false" >> "$GITHUB_OUTPUT"
          fi

          # --- SDK ---

          LAST_SDK_TAG=$(get_last_tag "sdk/v*.*.*")
          SDK_BASE="${LAST_SDK_TAG:-${INITIAL_COMMIT}}"
          SDK_COMMITS=$(git log "${SDK_BASE}..HEAD" --format="%s" -- packages/sdk/ \
            | grep -vc '^chore(release):' || true)

          if [[ "${SDK_COMMITS}" -gt 0 ]]; then
            SDK_MSGS=$(git log "${SDK_BASE}..HEAD" --format="%s%n%b" -- packages/sdk/)
            SDK_BUMP=$(get_bump_type "${SDK_MSGS}")
            [[ -n "${{ steps.pr_bump.outputs.sdk_override }}" ]] && SDK_BUMP="${{ steps.pr_bump.outputs.sdk_override }}"
            CURRENT=$(jq -r '.version' packages/sdk/package.json)
            NEW_VER=$(bump_version "${CURRENT}" "${SDK_BUMP}")
            if git rev-parse --verify "refs/tags/sdk/v${NEW_VER}" >/dev/null 2>&1; then
              echo "::notice::sdk/v${NEW_VER} already tagged — skipping"
              echo "release_sdk=false" >> "$GITHUB_OUTPUT"
            else
              echo "Detected SDK change: ${CURRENT} → ${NEW_VER} (${SDK_BUMP})"
              echo "release_sdk=true"     >> "$GITHUB_OUTPUT"
              echo "sdk_version=${NEW_VER}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No SDK changes detected"
            echo "release_sdk=false" >> "$GITHUB_OUTPUT"
          fi

          # --- Docker (api / app / db) ---

          LAST_DOCKER_TAG=$(get_last_tag "v*.*.*")
          DOCKER_BASE="${LAST_DOCKER_TAG:-${INITIAL_COMMIT}}"
          DOCKER_COMMITS=$(git log "${DOCKER_BASE}..HEAD" --format="%s" -- apps/api/ apps/app/ packages/db/ \
            | grep -vc '^chore(release):' || true)

          if [[ "${DOCKER_COMMITS}" -gt 0 ]]; then
            DOCKER_MSGS=$(git log "${DOCKER_BASE}..HEAD" --format="%s%n%b" -- apps/api/ apps/app/ packages/db/)
            DOCKER_BUMP=$(get_bump_type "${DOCKER_MSGS}")
            [[ -n "${{ steps.pr_bump.outputs.docker_override }}" ]] && DOCKER_BUMP="${{ steps.pr_bump.outputs.docker_override }}"
            CURRENT=$(jq -r '.version' apps/api/package.json)
            NEW_VER=$(bump_version "${CURRENT}" "${DOCKER_BUMP}")
            if git rev-parse --verify "refs/tags/v${NEW_VER}" >/dev/null 2>&1; then
              echo "::notice::v${NEW_VER} already tagged — skipping"
              echo "release_docker=false" >> "$GITHUB_OUTPUT"
            else
              DMAJOR="${NEW_VER%%.*}"
              DMINOR="${NEW_VER#*.}"
              DMINOR="${DMINOR%%.*}"
              echo "Detected Docker change: ${CURRENT} → ${NEW_VER} (${DOCKER_BUMP})"
              {
                echo "release_docker=true"
                echo "docker_version=${NEW_VER}"
                echo "docker_major=${DMAJOR}"
                echo "docker_minor=${DMINOR}"
              } >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No Docker changes detected"
            echo "release_docker=false" >> "$GITHUB_OUTPUT"
          fi

          # Output last known tags for changelog generation
          {
            echo "last_types_tag=${LAST_TYPES_TAG}"
            echo "last_sdk_tag=${LAST_SDK_TAG}"
            echo "last_docker_tag=${LAST_DOCKER_TAG}"
          } >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------- release-types
  release-types:
    name: Publish types to npm
    needs: detect
    if: needs.detect.outputs.release_types == 'true'
    uses: ./.github/workflows/_publish-types.yml
    with:
      version: ${{ needs.detect.outputs.types_version }}
      ref: ${{ needs.detect.outputs.sha }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------ tag-types
  # Creates the git tag and GitHub Release for types after a successful publish.
  tag-types:
    name: Tag types release
    needs: [detect, release-types]
    if: needs.release-types.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create and push git tag
        run: |
          VERSION="${{ needs.detect.outputs.types_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "types/v${VERSION}"
          git push origin "types/v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.detect.outputs.types_version }}"
          PREV_TAG="${{ needs.detect.outputs.last_types_tag }}"
          NEW_TAG="types/v${VERSION}"
          REPO="${{ github.repository }}"

          {
            echo "# Changes"
            echo ""
            if [ -n "${PREV_TAG}" ]; then
              # Only merged PRs are listed; direct pushes without a merge commit are skipped.
              while IFS= read -r SHA; do
                SUBJ=$(git log -1 --format="%s" "${SHA}")
                if [[ "${SUBJ}" =~ ^Merge\ pull\ request\ #([0-9]+)\ from ]]; then
                  PR_NUM="${BASH_REMATCH[1]}"
                  TITLE=$(git log -1 --format="%b" "${SHA}" | grep -m1 '.' | xargs)
                  [[ -n "${TITLE}" ]] && echo "- ${TITLE} [#${PR_NUM}]"
                fi
              done < <(git log "${PREV_TAG}..HEAD" --merges -m --format="%H" -- packages/types/ 2>/dev/null || true)
              echo ""
              echo "**Full Changelog**: [${PREV_TAG}...${NEW_TAG}](https://github.com/${REPO}/compare/${PREV_TAG}...${NEW_TAG})"
            else
              echo "**Full Changelog**: https://github.com/${REPO}/commits/${NEW_TAG}"
            fi
          } > /tmp/release_notes.md

          gh release create "${NEW_TAG}" \
            --title "Types v${VERSION}" \
            --notes-file /tmp/release_notes.md \
            --latest=false

  # ------------------------------------------------------------- release-sdk
  # Always listed after release-types so that if types is also being released
  # this job waits and can sync the freshly-published version from npm.
  # The explicit if condition allows release-types to be skipped (not releasing)
  # without blocking this job.
  release-sdk:
    name: Publish SDK to npm
    needs: [detect, release-types]
    if: >-
      always() &&
      needs.detect.result == 'success' &&
      needs.detect.outputs.release_sdk == 'true' &&
      needs.release-types.result != 'failure' &&
      needs.release-types.result != 'cancelled'
    uses: ./.github/workflows/_publish-sdk.yml
    with:
      version: ${{ needs.detect.outputs.sdk_version }}
      ref: ${{ needs.detect.outputs.sha }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # -------------------------------------------------------------- tag-sdk
  # Creates the git tag and GitHub Release for the SDK after a successful publish.
  tag-sdk:
    name: Tag SDK release
    needs: [detect, release-sdk]
    if: needs.release-sdk.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create and push git tag
        run: |
          VERSION="${{ needs.detect.outputs.sdk_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "sdk/v${VERSION}"
          git push origin "sdk/v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.detect.outputs.sdk_version }}"
          PREV_TAG="${{ needs.detect.outputs.last_sdk_tag }}"
          NEW_TAG="sdk/v${VERSION}"
          REPO="${{ github.repository }}"

          {
            echo "# Changes"
            echo ""
            if [ -n "${PREV_TAG}" ]; then
              # Only merged PRs are listed; direct pushes without a merge commit are skipped.
              while IFS= read -r SHA; do
                SUBJ=$(git log -1 --format="%s" "${SHA}")
                if [[ "${SUBJ}" =~ ^Merge\ pull\ request\ #([0-9]+)\ from ]]; then
                  PR_NUM="${BASH_REMATCH[1]}"
                  TITLE=$(git log -1 --format="%b" "${SHA}" | grep -m1 '.' | xargs)
                  [[ -n "${TITLE}" ]] && echo "- ${TITLE} [#${PR_NUM}]"
                fi
              done < <(git log "${PREV_TAG}..HEAD" --merges -m --format="%H" -- packages/sdk/ 2>/dev/null || true)
              echo ""
              echo "**Full Changelog**: [${PREV_TAG}...${NEW_TAG}](https://github.com/${REPO}/compare/${PREV_TAG}...${NEW_TAG})"
            else
              echo "**Full Changelog**: https://github.com/${REPO}/commits/${NEW_TAG}"
            fi
          } > /tmp/release_notes.md

          gh release create "${NEW_TAG}" \
            --title "SDK v${VERSION}" \
            --notes-file /tmp/release_notes.md \
            --latest=false

  # ------------------------------------------------------------- release-api
  release-api:
    name: Build and push API image
    needs: detect
    if: needs.detect.outputs.release_docker == 'true'
    uses: ./.github/workflows/_build-docker.yml
    with:
      image: api
      dockerfile: apps/api/Dockerfile
      version: ${{ needs.detect.outputs.docker_version }}
      major: ${{ needs.detect.outputs.docker_major }}
      minor: ${{ needs.detect.outputs.docker_minor }}
      ref: ${{ needs.detect.outputs.sha }}

  # ------------------------------------------------------------- release-app
  release-app:
    name: Build and push App image
    needs: detect
    if: needs.detect.outputs.release_docker == 'true'
    uses: ./.github/workflows/_build-docker.yml
    with:
      image: app
      dockerfile: apps/app/Dockerfile
      version: ${{ needs.detect.outputs.docker_version }}
      major: ${{ needs.detect.outputs.docker_major }}
      minor: ${{ needs.detect.outputs.docker_minor }}
      ref: ${{ needs.detect.outputs.sha }}

  # -------------------------------------------------------------- tag-docker
  # Runs after both image builds succeed; creates the shared git tag and
  # the GitHub Release (marked as the repository's latest release).
  tag-docker:
    name: Tag Docker release
    needs: [detect, release-api, release-app]
    if: needs.detect.outputs.release_docker == 'true' && needs.release-api.result == 'success' && needs.release-app.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create and push git tag
        run: |
          VERSION="${{ needs.detect.outputs.docker_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.detect.outputs.docker_version }}"
          PREV_TAG="${{ needs.detect.outputs.last_docker_tag }}"
          NEW_TAG="v${VERSION}"
          REPO="${{ github.repository }}"

          {
            echo "# Changes"
            echo ""
            if [ -n "${PREV_TAG}" ]; then
              # Only merged PRs are listed; direct pushes without a merge commit are skipped.
              while IFS= read -r SHA; do
                SUBJ=$(git log -1 --format="%s" "${SHA}")
                if [[ "${SUBJ}" =~ ^Merge\ pull\ request\ #([0-9]+)\ from ]]; then
                  PR_NUM="${BASH_REMATCH[1]}"
                  TITLE=$(git log -1 --format="%b" "${SHA}" | grep -m1 '.' | xargs)
                  [[ -n "${TITLE}" ]] && echo "- ${TITLE} [#${PR_NUM}]"
                fi
              done < <(git log "${PREV_TAG}..HEAD" --merges -m --format="%H" -- apps/api/ apps/app/ packages/db/ 2>/dev/null || true)
              echo ""
              echo "**Full Changelog**: [${PREV_TAG}...${NEW_TAG}](https://github.com/${REPO}/compare/${PREV_TAG}...${NEW_TAG})"
            else
              echo "**Full Changelog**: https://github.com/${REPO}/commits/${NEW_TAG}"
            fi
          } > /tmp/release_notes.md

          gh release create "${NEW_TAG}" \
            --title "Docker v${VERSION}" \
            --notes-file /tmp/release_notes.md \
            --latest=true

  # ------------------------------------------------------------ update-main
  # Commits the version bumps back to main so the repo stays in sync.
  # Runs after all release jobs (using always() so skipped jobs don't block
  # it), but only if at least one release succeeded and none failed.
  update-main:
    name: Update main with version bumps
    needs: [detect, tag-types, tag-sdk, tag-docker]
    if: >-
      always() &&
      needs.detect.result == 'success' &&
      needs.tag-types.result != 'failure' &&
      needs.tag-sdk.result != 'failure' &&
      needs.tag-docker.result != 'failure' &&
      (
        needs.tag-types.result == 'success' ||
        needs.tag-sdk.result == 'success' ||
        needs.tag-docker.result == 'success'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply version bumps
        run: |
          # Only apply bumps for packages whose tag jobs actually succeeded.
          # tag-types/tag-sdk succeed only after publish + tag + GH Release all
          # passed, so checking them (rather than the publish jobs) ensures we
          # never bump package.json for a partially-succeeded release.
          if [[ "${{ needs.tag-types.result }}" == "success" ]]; then
            echo "Bumping types → ${{ needs.detect.outputs.types_version }}"
            (cd packages/types && npm pkg set version="${{ needs.detect.outputs.types_version }}")
          fi
          if [[ "${{ needs.tag-sdk.result }}" == "success" ]]; then
            echo "Bumping SDK → ${{ needs.detect.outputs.sdk_version }}"
            (cd packages/sdk && npm pkg set version="${{ needs.detect.outputs.sdk_version }}")
          fi
          if [[ "${{ needs.tag-docker.result }}" == "success" ]]; then
            echo "Bumping API + App → ${{ needs.detect.outputs.docker_version }}"
            (cd apps/api && npm pkg set version="${{ needs.detect.outputs.docker_version }}")
            (cd apps/app && npm pkg set version="${{ needs.detect.outputs.docker_version }}")
          fi

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Check for modifications before staging to keep the working tree clean
          # if there's nothing to do.
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit — versions already match"
          else
            git add -A
            # The "chore(release):" prefix matches the skip-release guard in the
            # detect job, breaking the infinite loop.  [skip ci] is an extra safeguard.
            git commit -m "chore(release): bump versions [skip ci]"
            git push origin main
          fi
