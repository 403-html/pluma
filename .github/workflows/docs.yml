# Pluma Docs — GitHub Pages Deployment
#
# Builds the Nextra v4 static site in apps/docs and deploys it to GitHub Pages.
# Published URL: https://403-html.github.io/pluma
#
# Prerequisites (one-time repo setup):
#   1. Go to Settings → Pages → Source → "GitHub Actions"
#   2. The GITHUB_TOKEN permissions below are sufficient; no extra secrets needed.
#
# Triggers:
#   • Push to main when files under apps/docs/** (or this workflow) change
#   • Manual dispatch via the Actions tab

name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - "packages/sdk/package.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Only one deployment at a time; never cancel an in-progress deployment so
# the live site is not left in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Build
  # ─────────────────────────────────────────────
  build:
    name: Build docs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract SDK version
        run: |
          SDK_VERSION=$(jq -r '.version' packages/sdk/package.json)
          echo "SDK_VERSION=${SDK_VERSION}" >> $GITHUB_ENV

      - name: Build docs site
        run: pnpm --filter @pluma-flags/docs build
        env:
          NEXT_PUBLIC_SDK_VERSION: ${{ env.SDK_VERSION }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out

  # ─────────────────────────────────────────────
  # Job 2 — Deploy  (requires build ✓)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
