# Consolidated release workflow for Pluma.
#
# Trigger: GitHub release published.
# Tag routing:
#   sdk/v*   → publish @pluma-flags/sdk to npm
#   types/v* → publish @pluma-flags/types to npm
#   v*       → build & push Docker images to GHCR
#
# After a successful publish the workflow pushes the version bump
# back to main so the repo stays in sync with the released version.
#
# Required secrets:
#   - NPM_TOKEN: npm publish authentication (sdk & types jobs)
#   - GITHUB_TOKEN: auto-provided — GHCR push + main branch update

name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

permissions:
  contents: write    # needed by update-main to push to main
  packages: write    # needed by Docker jobs to push to GHCR
  id-token: write    # needed by SDK publish for npm provenance

jobs:
  # ------------------------------------------------------------------ detect
  detect:
    name: Detect release target
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.parse.outputs.target }}
      version: ${{ steps.parse.outputs.version }}
      major: ${{ steps.parse.outputs.major }}
      minor: ${{ steps.parse.outputs.minor }}

    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"

          if [[ "$TAG" == sdk/v* ]]; then
            TARGET="sdk"
            VERSION="${TAG#sdk/v}"
          elif [[ "$TAG" == types/v* ]]; then
            TARGET="types"
            VERSION="${TAG#types/v}"
          elif [[ "$TAG" == v* ]]; then
            TARGET="docker"
            VERSION="${TAG#v}"
          else
            echo "::error::Unrecognised tag format: '$TAG'"
            exit 1
          fi

          # Validate semver
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid semver: '$VERSION'"
            exit 1
          fi

          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION#*.}"
          MINOR="${MINOR%%.*}"

          echo "target=$TARGET"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR"     >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"     >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------- publish-types
  publish-types:
    name: Publish types to npm
    needs: detect
    if: needs.detect.outputs.target == 'types'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: (cd packages/types && npm pkg set version="${{ needs.detect.outputs.version }}")

      - name: Build types
        run: pnpm --filter @pluma-flags/types build

      - name: Publish to npm
        run: pnpm --filter @pluma-flags/types publish --no-git-checks --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------- publish-sdk
  publish-sdk:
    name: Publish SDK to npm
    needs: detect
    if: needs.detect.outputs.target == 'sdk'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: (cd packages/sdk && npm pkg set version="${{ needs.detect.outputs.version }}")

      - name: Build types
        run: pnpm --filter @pluma-flags/types build

      - name: Build SDK
        run: pnpm --filter @pluma-flags/sdk build

      - name: Run SDK tests
        run: pnpm --filter @pluma-flags/sdk test

      - name: Publish to npm
        run: pnpm --filter @pluma-flags/sdk publish --no-git-checks --access public --provenance --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------- release-api
  release-api:
    name: Release API image
    needs: detect
    if: needs.detect.outputs.target == 'docker'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pluma-api
          tags: |
            type=raw,value=v${{ needs.detect.outputs.version }}
            type=raw,value=v${{ needs.detect.outputs.major }}.${{ needs.detect.outputs.minor }}
            type=raw,value=latest
            type=sha

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------- release-app
  release-app:
    name: Release App image
    needs: detect
    if: needs.detect.outputs.target == 'docker'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pluma-app
          tags: |
            type=raw,value=v${{ needs.detect.outputs.version }}
            type=raw,value=v${{ needs.detect.outputs.major }}.${{ needs.detect.outputs.minor }}
            type=raw,value=latest
            type=sha

      - name: Build and push App image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------ update-main
  update-main:
    name: Update main with version bump
    needs: [detect, publish-types, publish-sdk, release-api, release-app]
    if: >-
      always() &&
      needs.detect.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in package.json
        run: |
          TARGET="${{ needs.detect.outputs.target }}"
          VERSION="${{ needs.detect.outputs.version }}"
          case "$TARGET" in
            types) (cd packages/types && npm pkg set version="$VERSION") ;;
            sdk)   (cd packages/sdk && npm pkg set version="$VERSION") ;;
            docker)
              (cd apps/api && npm pkg set version="$VERSION")
              (cd apps/app && npm pkg set version="$VERSION")
              ;;
          esac

      - name: Commit and push to main
        run: |
          TARGET="${{ needs.detect.outputs.target }}"
          VERSION="${{ needs.detect.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(release): $TARGET v$VERSION"
          git push origin main
