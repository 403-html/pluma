# Consolidated release workflow for Pluma.
#
# Trigger: GitHub release published.
# Tag routing:
#   sdk/v*   → publish @pluma-flags/sdk to npm
#   types/v* → publish @pluma-flags/types to npm
#   v*       → build & push Docker images to GHCR
#
# After a successful publish the workflow pushes the version bump
# back to main so the repo stays in sync with the released version.
#
# Required secrets:
#   - NPM_TOKEN: npm publish authentication (sdk & types jobs)
#   - GITHUB_TOKEN: auto-provided — GHCR push + main branch update

name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

permissions:
  contents: write    # needed by update-main to push to main
  packages: write    # needed by Docker jobs to push to GHCR
  id-token: write    # needed by SDK publish for npm provenance

jobs:
  # ------------------------------------------------------------------ detect
  detect:
    name: Detect release target
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.parse.outputs.target }}
      version: ${{ steps.parse.outputs.version }}
      major: ${{ steps.parse.outputs.major }}
      minor: ${{ steps.parse.outputs.minor }}

    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"

          if [[ "$TAG" == sdk/v* ]]; then
            TARGET="sdk"
            VERSION="${TAG#sdk/v}"
          elif [[ "$TAG" == types/v* ]]; then
            TARGET="types"
            VERSION="${TAG#types/v}"
          elif [[ "$TAG" == v* ]]; then
            TARGET="docker"
            VERSION="${TAG#v}"
          else
            echo "::error::Unrecognized tag format: '$TAG'"
            exit 1
          fi

          # Validate semver
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid semver: '$VERSION'"
            exit 1
          fi

          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION#*.}"
          MINOR="${MINOR%%.*}"

          {
            echo "target=$TARGET"
            echo "version=$VERSION"
            echo "major=$MAJOR"
            echo "minor=$MINOR"
          } >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------- publish-types
  publish-types:
    name: Publish types to npm
    needs: detect
    if: needs.detect.outputs.target == 'types'
    uses: ./.github/workflows/_publish-types.yml
    with:
      version: ${{ needs.detect.outputs.version }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------- publish-sdk
  publish-sdk:
    name: Publish SDK to npm
    needs: detect
    if: needs.detect.outputs.target == 'sdk'
    uses: ./.github/workflows/_publish-sdk.yml
    with:
      version: ${{ needs.detect.outputs.version }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------------- release-api
  release-api:
    name: Release API image
    needs: detect
    if: needs.detect.outputs.target == 'docker'
    uses: ./.github/workflows/_build-docker.yml
    with:
      image: api
      dockerfile: apps/api/Dockerfile
      version: ${{ needs.detect.outputs.version }}
      major: ${{ needs.detect.outputs.major }}
      minor: ${{ needs.detect.outputs.minor }}

  # ------------------------------------------------------------- release-app
  release-app:
    name: Release App image
    needs: detect
    if: needs.detect.outputs.target == 'docker'
    uses: ./.github/workflows/_build-docker.yml
    with:
      image: app
      dockerfile: apps/app/Dockerfile
      version: ${{ needs.detect.outputs.version }}
      major: ${{ needs.detect.outputs.major }}
      minor: ${{ needs.detect.outputs.minor }}

  # ------------------------------------------------------------ update-main
  update-main:
    name: Update main with version bump
    needs: [detect, publish-types, publish-sdk, release-api, release-app]
    if: >-
      always() &&
      needs.detect.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in package.json
        run: |
          TARGET="${{ needs.detect.outputs.target }}"
          VERSION="${{ needs.detect.outputs.version }}"
          case "$TARGET" in
            types) (cd packages/types && npm pkg set version="$VERSION") ;;
            sdk)   (cd packages/sdk && npm pkg set version="$VERSION") ;;
            docker)
              (cd apps/api && npm pkg set version="$VERSION")
              (cd apps/app && npm pkg set version="$VERSION")
              ;;
          esac

      - name: Update Docker image tags in docs and compose example
        if: needs.detect.outputs.target == 'docker'
        run: |
          VERSION="v${{ needs.detect.outputs.version }}"
          sed -i "s|ghcr.io/403-html/pluma-api:v[0-9]*\.[0-9]*\.[0-9]*|ghcr.io/403-html/pluma-api:${VERSION}|g" \
            docker-compose.example.yml \
            apps/docs/content/getting-started.mdx \
            apps/docs/content/scaling.mdx
          sed -i "s|ghcr.io/403-html/pluma-app:v[0-9]*\.[0-9]*\.[0-9]*|ghcr.io/403-html/pluma-app:${VERSION}|g" \
            docker-compose.example.yml \
            apps/docs/content/getting-started.mdx \
            apps/docs/content/scaling.mdx

      - name: Commit and push to main
        run: |
          TARGET="${{ needs.detect.outputs.target }}"
          VERSION="${{ needs.detect.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit — version already matches"
          else
            git commit -m "chore(release): $TARGET v$VERSION"
            git push origin main
          fi
